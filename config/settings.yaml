# 全局运行参数. 可在不改代码的前提下调整.

router:
  tau: 0.3          # 置信度兜底阈值, max(conf) < tau 时触发 fallback
  margin: 0.2       # 单科室判定边际, top1 - top2 > margin 即 single_clear
  temperature: 1.0  # softmax 温度
  top_k: 10         # 检索 top_k
  top_k_keep: 4     # 候选科室数量上限 (论文 4.3.2: Top-K 截断, 仅保留高置信子集)
  tau_keep: 0.10    # 候选保留最低置信度, conf < tau_keep 的科室直接剔除

aggregator:
  tau_consist: 0.75 # L1 一致性余弦最小值阈值
  alpha: 0.3333     # L2 相关度权重
  beta: 0.3333      # L2 置信度权重
  gamma: 0.3334     # L2 完整度权重

model:
  rank_bins: [8, 16, 24, 32]
  default_rank: 16  # mock 模式固定档位
  max_new_tokens: 1024
  # mock: true
  mock: false
  # 阶段 7: 切换真实模式时将 mock 改为 false，并填入以下两个路径
  base_model_path: "/root/autodl-tmp/develop/modle/Qwen2.5-3B-Instruct"
  lora_adapter_path: "/root/autodl-tmp/moelora-med/outputs/qwen25_3b_moelora_qv/best"

embedder:
  # 支持在线名称或本地路径; 无外网时填本地缓存目录
  model_name_or_path: "/root/.cache/huggingface/hub/models--BAAI--bge-base-zh-v1.5/snapshots/f03589ceff5aac7111bd60cfc7d497ca17ecac65"
  device: "cpu"
  batch_size: 16
  normalize: true   # 归一化后内积 == 余弦相似度

retriever:
  index_path: "data/faiss_index"
  chunk_size: 256   # 段落切分字符数
  chunk_overlap: 32

timeouts:
  agent_seconds: 300  # 真实模式: 3B 模型单次推理 ~18s, 3 个 agent 序列化后最长 ~60s, 预留 5x 余量

storage:
  sqlite_path: "data/consultation.db"

safety:
  low_risk_threshold: 2  # 低危命中超过该数视为累计高危

logging:
  level: "INFO"
